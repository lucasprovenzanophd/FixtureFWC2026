<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 Fixture</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="glass-panel main-header">
    <div class="header-content">
      <h1 id="app-title">FIFA World Cup 2026™</h1>
      <p id="app-subtitle">Interactive Fixture & Standings</p>
    </div>
    <div class="header-actions">
      <div class="lang-toggle" id="lang-toggle-container">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
      <button id="themeToggleBtn" class="btn btn-outline theme-toggle-btn" aria-label="Toggle Theme">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <main class="container">
    <nav class="tabs glass-panel">
      <button class="tab-btn active" data-target="group-stage" id="tab-group">Group Stage</button>
      <button class="tab-btn" data-target="knockout-stage" id="tab-knockout">Knockout Stage</button>
    </nav>

    <section id="group-stage" class="stage-section active">
      <div class="groups-grid" id="groups-container">
        <!-- Groups will be injected here via JS -->
      </div>
    </section>

    <section id="knockout-stage" class="stage-section">
      <div id="knockout-progress-container"></div>
      <nav class="sub-tabs glass-panel" id="knockout-tabs">
        <!-- Sub-tabs for Round of 32, 16, etc. will be injected via JS -->
      </nav>
      <div class="knockout-bracket" id="bracket-container">
        <!-- Knockout bracket will be injected here via JS -->
      </div>
    </section>
  </main>

  <footer class="glass-panel main-footer">
    <p id="footer-text">World Cup 2026 Fixture Tracker - Mobile Responsive & Local Storage Ready</p>
    <button id="resetBtn" class="btn btn-danger btn-reset-bottom">Reset All Data</button>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
